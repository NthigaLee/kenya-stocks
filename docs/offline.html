<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — NSE Insights</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; color: #00ff88; margin-bottom: 0.75rem; }
    p { color: #888; font-size: 0.95rem; line-height: 1.6; max-width: 320px; }
    .retry {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>NSE Insights needs a connection to load fresh market data. Your cached data is available once reconnected.</p>
  <button class="retry" onclick="location.reload()">Try again</button>
</body>
</html>
